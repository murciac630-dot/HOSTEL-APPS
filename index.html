<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Clave Hostel | ERP Operativo Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Transiciones suaves para el cambio de módulos */
    .module { transition: all 0.3s ease; }
    .hidden { display: none !important; }
    
    /* Estilos globales para inputs profesionales */
    input, select, textarea { 
      border: 1px solid #d1d5db; 
      padding: 0.6rem; 
      border-radius: 0.5rem; 
      width: 100%; 
      outline: none; 
      background-color: white; 
      font-size: 14px; 
    }
    input:focus, select:focus { border-color: #000; box-shadow: 0 0 0 1px #000; }
    
    /* Etiquetas de formulario pequeñas y en mayúsculas */
    label { 
      font-size: 10px; 
      text-transform: uppercase; 
      font-weight: 800; 
      color: #4b5563; 
      margin-left: 4px; 
      margin-bottom: 2px; 
      display: block; 
    }
    
    /* Estilos para encabezados de tabla */
    th { text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    
    /* Alerta roja para la comisión del datáfono */
    .alert-8 { 
      color: #ef4444; 
      font-weight: 700; 
      font-size: 11px; 
      margin-top: 4px; 
      display: block; 
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Mejora de contraste para la marca de agua mejorada */
    .watermark-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      /* Ajuste de opacidad: 0.12 (12%) para un balance perfecto */
      opacity: 0.12; 
      z-index: 0;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900 font-sans">

<!-- Logo de Fondo (Marca de Agua con Opacidad Mejorada) -->
<div class="watermark-container">
  <img src="LC Logo IG-FB ProfilePic.png" alt="La Clave Watermark" class="max-w-2xl w-2/3 object-contain">
</div>

<div class="flex relative z-10">
  <!-- Sidebar de Navegación -->
  <aside class="w-64 bg-black text-white min-h-screen p-6 fixed shadow-2xl overflow-y-auto">
    <img src="LC Logo IG-FB ProfilePic.png" alt="Logo La Clave" class="w-28 mx-auto mb-6 rounded-lg bg-white/10 p-2 shadow-inner">
    <div class="text-center mb-8">
      <h2 class="text-xs font-black tracking-[0.2em] text-gray-400 uppercase">Administración</h2>
    </div>
    <nav class="space-y-2">
      <button onclick="showModule('caja-menor')" class="w-full text-left p-3 hover:bg-gray-800 rounded-lg transition text-sm font-semibold flex items-center gap-3">
        <span>💰</span> Caja Menor
      </button>
      <button onclick="showModule('reservas')" class="w-full text-left p-3 hover:bg-gray-800 rounded-lg transition text-sm font-semibold flex items-center gap-3">
        <span>📅</span> Reservas & Pagos
      </button>
      <button onclick="showModule('inventario')" class="w-full text-left p-3 hover:bg-gray-800 rounded-lg transition text-sm font-semibold flex items-center gap-3">
        <span>📦</span> Inventario
      </button>
      <button onclick="showModule('staff')" class="w-full text-left p-3 hover:bg-gray-800 rounded-lg transition text-sm font-semibold flex items-center gap-3">
        <span>👥</span> Staff & Equipo
      </button>
    </nav>
  </aside>

  <!-- Área de Contenido Principal -->
  <main class="ml-64 flex-1 p-8">

    <!-- MÓDULO: RESERVAS -->
    <section id="reservas" class="module">
      <div class="flex justify-between items-end mb-8">
        <div>
          <h1 class="text-4xl font-black italic tracking-tighter uppercase">Reservas</h1>
          <p class="text-gray-400 text-sm">Registro legal y control de pagos</p>
        </div>
      </div>

      <div class="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-xl mb-8 border border-gray-100">
        <div class="grid md:grid-cols-3 gap-6">
          
          <div><label>Nombre del Huésped</label><input id="res-cliente" placeholder="Nombre completo"></div>
          <div><label>N° Identificación (ID/Pasaporte)</label><input id="res-id" placeholder="Documento legal"></div>
          <div><label>Email (Obligatorio)</label><input id="res-email" type="email" placeholder="cliente@correo.com"></div>
          <div><label>WhatsApp / Teléfono</label><input id="res-whatsapp" placeholder="Ej: +57 300..."></div>

          <div>
            <label>Habitación / Cama</label>
            <select id="res-habitacion">
              <option value="">-- Seleccionar Habitación --</option>
              <optgroup label="Habitaciones Privadas">
                <option>Andrés Caicedo</option>
                <option>Jairo Varela</option>
                <option>Sebastián de belalcázar</option>
                <option>Jovita</option>
              </optgroup>
              <optgroup label="Camas en Dormitorio">
                <option>Guayacán (Cama)</option>
                <option>Grupo Niche (Cama)</option>
                <option>Agua e Lulo (Cama)</option>
                <option>Habitación 8 (Cama)</option>
              </optgroup>
            </select>
          </div>

          <div><label>Fecha de Check-In</label><input id="res-checkin" type="date"></div>

          <div><label>Ciudad de Origen</label><input id="res-origen" placeholder="¿De dónde viene?"></div>
          <div><label>Próxima Ciudad</label><input id="res-proxima" placeholder="¿A dónde se dirige?"></div>
          <div><label>Canal de Reserva</label>
            <select id="res-plataforma">
              <option>Directo / WhatsApp</option>
              <option>Airbnb</option>
              <option>Booking</option>
              <option>Hostelworld</option>
              <option>Walk-in</option>
            </select>
          </div>
          
          <div class="relative">
            <label>Medio de Pago</label>
            <select id="res-metodo" onchange="toggleDatafono(this.value)">
              <option value="Efectivo">Efectivo</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Datafono">Datáfono</option>
            </select>
            <div id="alerta-comision" class="hidden alert-8">
              ⚠️ APLICAR +8% DE COMISIÓN BANCARIA
            </div>
          </div>

          <div id="campo-aprobacion" class="hidden">
            <label>Código de Aprobación</label>
            <input id="res-aprobacion" placeholder="Código de 6 dígitos">
          </div>

          <div><label>Valor Total Pagado (COP)</label><input id="res-valor" type="number" placeholder="$ 0"></div>
          
          <div class="md:col-span-3 pt-6 border-t mt-2">
            <button onclick="guardarReserva()" class="w-full bg-black text-white p-4 rounded-2xl font-black uppercase tracking-[0.2em] hover:bg-gray-800 transition shadow-lg active:scale-95">
              Confirmar Registro en Sistema
            </button>
          </div>
        </div>
      </div>

      <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-lg overflow-hidden border border-gray-100">
        <div class="bg-gray-50/50 p-4 border-b flex justify-between items-center text-gray-500 font-bold uppercase text-xs">
          <span>Libro de Huéspedes Recientes</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-black text-white">
              <tr>
                <th class="p-4">Huésped / ID</th>
                <th class="p-4">Habitación</th>
                <th class="p-4 text-center">Pago / Cód.</th>
                <th class="p-4">Origen ➡️ Destino</th>
                <th class="p-4 text-right">Total</th>
              </tr>
            </thead>
            <tbody id="tablaReservas"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- MÓDULO: CAJA MENOR -->
    <section id="caja-menor" class="module hidden">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-black italic uppercase tracking-tighter">Caja Menor</h1>
        <button onclick="generarCuadre()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
          Generar Cuadre de Turno
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-md border-b-8 border-green-500 text-center">
          <label class="mb-2">Saldo en Libros (Sistema)</label>
          <p id="saldo-total" class="text-5xl font-black text-green-600 tracking-tighter">$ 0</p>
        </div>
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-md border-b-8 border-black flex flex-col justify-center text-center">
          <label class="mb-2">Última Actividad</label>
          <p id="estado-turno" class="text-gray-400 italic text-sm">No hay registros hoy</p>
        </div>
      </div>

      <div class="bg-white/90 p-6 rounded-3xl shadow-md mb-8">
        <div class="grid md:grid-cols-4 gap-4">
          <div><label>Valor</label><input id="caja-monto" type="number" placeholder="0"></div>
          <div><label>Tipo de Registro</label>
            <select id="caja-tipo">
              <option value="apertura">Saldo Inicial (Base)</option>
              <option value="ingreso">Ingreso / Venta</option>
              <option value="gasto">Gasto / Egreso</option>
            </select>
          </div>
          <div><label>Concepto / Detalle</label><input id="caja-desc" type="text" placeholder="Ej: Compra de hielo"></div>
          <div class="flex items-end">
            <button onclick="registrarCaja()" class="w-full bg-black text-white p-3 rounded-xl font-bold hover:bg-gray-800 transition">Grabar Movimiento</button>
          </div>
        </div>
      </div>

      <table class="w-full bg-white rounded-2xl shadow-md overflow-hidden text-sm">
        <thead class="bg-gray-100 text-gray-500 border-b">
          <tr><th class="p-4 text-left">Hora</th><th class="p-4 text-left">Descripción</th><th class="p-4 text-center">Estado</th><th class="p-4 text-right">Monto</th></tr>
        </thead>
        <tbody id="tablaCaja"></tbody>
      </table>
    </section>

  </main>
</div>

<script>
// Base de datos persistente en el navegador
let db = {
  caja: JSON.parse(localStorage.getItem('lc_caja_v3')) || [],
  reservas: JSON.parse(localStorage.getItem('lc_reservas_v3')) || []
};

function showModule(id) {
  document.querySelectorAll('.module').forEach(m => m.classList.add('hidden'));
  const target = document.getElementById(id);
  if (target) target.classList.remove('hidden');
}

function registrarCaja() {
  const monto = parseFloat(document.getElementById('caja-monto').value);
  const tipo = document.getElementById('caja-tipo').value;
  const desc = document.getElementById('caja-desc').value;
  if(!monto || !desc) return alert("Por favor, ingrese el valor y el concepto.");
  const registro = { id: Date.now(), hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), desc, tipo, monto };
  db.caja.push(registro);
  localStorage.setItem('lc_caja_v3', JSON.stringify(db.caja));
  document.getElementById('caja-monto').value = '';
  document.getElementById('caja-desc').value = '';
  renderCaja();
}

function renderCaja() {
  const t = document.getElementById('tablaCaja');
  let saldo = 0; t.innerHTML = '';
  db.caja.slice().reverse().forEach(i => {
    if(i.tipo === 'ingreso' || i.tipo === 'apertura') saldo += i.monto;
    else saldo -= i.monto;
    const colorMonto = i.tipo === 'gasto' ? 'text-red-500' : 'text-green-600';
    t.innerHTML += `<tr class="border-b"><td class="p-4 font-bold text-gray-400">${i.hora}</td><td class="p-4 font-medium">${i.desc}</td><td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[9px] font-black uppercase ${i.tipo==='gasto'?'bg-red-100 text-red-600':'bg-green-100 text-green-600'}">${i.tipo}</span></td><td class="p-4 text-right font-bold ${colorMonto}">$ ${i.monto.toLocaleString()}</td></tr>`;
  });
  document.getElementById('saldo-total').innerText = `$ ${saldo.toLocaleString()}`;
  if(db.caja.length > 0) document.getElementById('estado-turno').innerText = "Turno en operación";
}

function generarCuadre() {
  const sistema = parseFloat(document.getElementById('saldo-total').innerText.replace(/[^0-9.-]+/g,""));
  const real = parseFloat(prompt("VERIFICACIÓN DE CAJA:\nIngrese el efectivo físico contado:"));
  if(isNaN(real)) return;
  const diferencia = real - sistema;
  alert(`REPORTE:\nSISTEMA: $ ${sistema.toLocaleString()}\nFÍSICO: $ ${real.toLocaleString()}\n\nDIFERENCIA: $ ${diferencia.toLocaleString()}`);
}

function toggleDatafono(val) {
  document.getElementById('campo-aprobacion').classList.toggle('hidden', val !== 'Datafono');
  document.getElementById('alerta-comision').classList.toggle('hidden', val !== 'Datafono');
}

function guardarReserva() {
  const res = {
    cliente: document.getElementById('res-cliente').value,
    id_legal: document.getElementById('res-id').value,
    email: document.getElementById('res-email').value,
    whatsapp: document.getElementById('res-whatsapp').value,
    habitacion: document.getElementById('res-habitacion').value,
    checkin: document.getElementById('res-checkin').value,
    origen: document.getElementById('res-origen').value,
    proxima: document.getElementById('res-proxima').value,
    metodo: document.getElementById('res-metodo').value,
    cod: document.getElementById('res-aprobacion').value || 'N/A',
    valor: document.getElementById('res-valor').value
  };
  if(!res.cliente || !res.id_legal || !res.email || !res.habitacion || !res.valor) {
    return alert("⚠️ ERROR: Completa los campos obligatorios.");
  }
  db.reservas.push(res);
  localStorage.setItem('lc_reservas_v3', JSON.stringify(db.reservas));
  renderReservas();
  document.querySelectorAll('#reservas input, #reservas select').forEach(i => i.value = '');
  toggleDatafono('Efectivo');
}

function renderReservas() {
  const t = document.getElementById('tablaReservas'); t.innerHTML = '';
  db.reservas.slice().reverse().forEach(r => {
    t.innerHTML += `<tr class="border-b hover:bg-gray-50 transition"><td class="p-4"><b>${r.cliente}</b><br><span class="text-[10px] text-gray-400">ID: ${r.id_legal}</span></td><td class="p-4 text-xs font-semibold text-gray-700">${r.habitacion}</td><td class="p-4 text-center"><b>${r.metodo}</b><br><span class="text-[9px] text-gray-400">Aprob: ${r.cod}</span></td><td class="p-4 text-[11px] text-gray-500 leading-tight">${r.email}<br><span class="text-black font-medium">${r.whatsapp}</span></td><td class="p-4 text-right font-black text-green-600">$ ${Number(r.valor).toLocaleString()}</td></tr>`;
  });
}

window.onload = () => { renderCaja(); renderReservas(); };
</script>
</body>
</html>
