<script>
// Inicialización de datos con validación
let reservas = JSON.parse(localStorage.getItem('reservas')) || [];
let facturas = JSON.parse(localStorage.getItem('facturas')) || [];

// 1. Función para cambiar de módulos (Navegación)
function showModule(id) {
  document.querySelectorAll('.module').forEach(section => section.classList.add('hidden'));
  const target = document.getElementById(id);
  if (target) {
    target.classList.remove('hidden');
  }
}

// 2. Función para guardar reservas
function guardarReserva() {
  const reserva = {
    cliente: document.getElementById('cliente').value,
    documento: document.getElementById('documento').value,
    contacto: document.getElementById('contacto').value,
    habitacion: document.getElementById('habitacion').value,
    plataforma: document.getElementById('plataforma').value,
    valor: document.getElementById('valor').value,
    metodo: document.getElementById('metodo').value,
  };

  if (!reserva.cliente) return alert("Por favor ingresa al menos el nombre del cliente");

  reservas.push(reserva);
  localStorage.setItem('reservas', JSON.stringify(reservas));
  renderReservas();
  
  // Limpiar campos
  document.querySelectorAll('#reservas input').forEach(i => i.value = '');
} // <-- AQUÍ FALTABA ESTE CIERRE

// 3. Función para exportar a SIIGO
function exportarSIIGO() {
  const factura = {
    nombre: document.getElementById('fact_nombre').value,
    documento: document.getElementById('fact_documento').value,
    correo: document.getElementById('fact_correo').value,
    telefono: document.getElementById('fact_telefono').value,
    concepto: document.getElementById('fact_concepto').value,
    valor: document.getElementById('fact_valor').value,
    metodo: document.getElementById('fact_metodo').value,
    estado: document.getElementById('fact_estado').value,
    fecha: new Date().toLocaleDateString()
  };

  if (!factura.nombre) return alert("Ingresa el nombre para la factura");

  facturas.push(factura);
  localStorage.setItem('facturas', JSON.stringify(facturas));
  renderFacturas();

  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(factura, null, 2));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute('href', dataStr);
  downloadAnchorNode.setAttribute('download', `factura_siigo_${factura.nombre}.json`);
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

// 4. Funciones de Renderizado (Dibujar tablas)
function renderFacturas() {
  const tabla = document.getElementById('tablaFacturas');
  if (!tabla) return;
  tabla.innerHTML = '';

  facturas.forEach(f => {
    tabla.innerHTML += `
      <tr class="border-b">
        <td class="p-2">${f.nombre}</td>
        <td>${f.concepto}</td>
        <td>$${f.valor}</td>
        <td><span class="px-2 py-1 rounded text-xs ${f.estado === 'Facturada' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">${f.estado}</span></td>
      </tr>
    `;
  });
}

function renderReservas() {
  const tabla = document.getElementById('tablaReservas');
  if (!tabla) return;
  tabla.innerHTML = '';
  reservas.forEach(r => {
    tabla.innerHTML += `
      <tr class="border-b">
        <td class="p-2">${r.cliente}</td>
        <td>${r.plataforma}</td>
        <td>${r.habitacion}</td>
        <td>$${r.valor}</td>
        <td>${r.metodo}</td>
      </tr>
    `;
  });
}

// 5. Inicialización de Gráficos y Tablas al cargar
window.onload = () => {
  renderReservas();
  renderFacturas();

  const ctx = document.getElementById('financeChart');
  if (ctx) {
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Reservas', 'Bar', 'Gastos'],
        datasets: [{
          label: 'Flujo Financiero (COP)',
          data: [1200000, 450000, 600000], // Datos de ejemplo
          backgroundColor: ['#fbbf24', '#000000', '#ef4444']
        }]
      }
    });
  }
};
</script>
