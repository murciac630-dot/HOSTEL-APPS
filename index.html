<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Clave Hostel | ERP Operativo Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .module { transition: all 0.3s ease; }
    .hidden { display: none !important; }
    input, select, textarea { border: 1px solid #d1d5db; padding: 0.6rem; border-radius: 0.5rem; width: 100%; outline: none; background-color: white; font-size: 14px; }
    input:focus { border-color: #000; box-shadow: 0 0 0 1px #000; }
    label { font-size: 10px; text-transform: uppercase; font-weight: 800; color: #4b5563; margin-left: 4px; margin-bottom: 2px; display: block; }
    th { text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900">

<div class="fixed inset-0 flex items-center justify-center pointer-events-none opacity-5 z-0">
  <img src="LC Logo IG-FB ProfilePic.png" alt="" class="max-w-2xl w-2/3 object-contain">
</div>

<div class="flex relative z-10">
  <aside class="w-64 bg-black text-white min-h-screen p-6 fixed shadow-2xl overflow-y-auto">
    <img src="LC Logo IG-FB ProfilePic.png" alt="Logo" class="w-28 mx-auto mb-6 rounded-lg bg-white/10 p-2">
    <nav class="space-y-2">
      <button onclick="showModule('caja-menor')" class="w-full text-left p-3 hover:bg-gray-800 rounded transition text-sm font-medium">💰 Caja Menor</button>
      <button onclick="showModule('reservas')" class="w-full text-left p-3 hover:bg-gray-800 rounded transition text-sm font-medium">📅 Reservas</button>
      <button onclick="showModule('inventario')" class="w-full text-left p-3 hover:bg-gray-800 rounded transition text-sm font-medium">📦 Inventario</button>
      <button onclick="showModule('staff')" class="w-full text-left p-3 hover:bg-gray-800 rounded transition text-sm font-medium">👥 Staff</button>
    </nav>
  </aside>

  <main class="ml-64 flex-1 p-8">

    <section id="caja-menor" class="module">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-black italic">CAJA MENOR</h1>
        <button onclick="generarCuadre()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">Generar Cuadre</button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-center">
        <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
          <label>Saldo Disponible (Sistema)</label>
          <p id="saldo-total" class="text-4xl font-black text-green-600">$0</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-black flex flex-col justify-center text-gray-500 italic">
          <label>Estado de Turno</label>
          <p id="estado-turno" class="text-sm font-mono">No se ha registrado apertura</p>
        </div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-md mb-8">
        <div class="grid md:grid-cols-4 gap-4">
          <div><label>Monto</label><input id="caja-monto" type="number" placeholder="0"></div>
          <div><label>Tipo</label>
            <select id="caja-tipo">
              <option value="apertura">Saldo Inicial</option>
              <option value="ingreso">Ingreso</option>
              <option value="gasto">Gasto / Egreso</option>
            </select>
          </div>
          <div><label>Descripción</label><input id="caja-desc" type="text" placeholder="Concepto"></div>
          <div class="flex items-end"><button onclick="registrarCaja()" class="w-full bg-black text-white p-2.5 rounded-lg font-bold hover:bg-gray-800">Registrar</button></div>
        </div>
      </div>
      <table class="w-full bg-white rounded-2xl shadow-md overflow-hidden">
        <thead class="bg-gray-50 text-gray-500 border-b">
          <tr><th class="p-4 text-left">Hora</th><th class="p-4 text-left">Descripción</th><th class="p-4 text-left text-center">Tipo</th><th class="p-4 text-right">Monto</th></tr>
        </thead>
        <tbody id="tablaCaja" class="text-sm"></tbody>
      </table>
    </section>

    <section id="reservas" class="module hidden">
      <h1 class="text-3xl font-black italic mb-8">RESERVAS & PAGOS</h1>
      <div class="bg-white p-6 rounded-2xl shadow-md mb-8">
        <div class="grid md:grid-cols-3 gap-6">
          <div><label>Huésped</label><input id="res-cliente" placeholder="Nombre completo"></div>
          <div><label>Email del Cliente</label><input id="res-email" type="email" placeholder="cliente@ejemplo.com"></div>
          <div><label>N° Contacto (WhatsApp)</label><input id="res-whatsapp" placeholder="300 000 0000"></div>

          <div>
            <label>Habitación / Cama</label>
            <select id="res-habitacion">
              <option value="">Seleccionar...</option>
              <option>Andrés Caicedo</option><option>Jairo Varela</option><option>Sebastián de belalcázar</option>
              <option>Guayacán (Cama)</option><option>Grupo Niche (Cama)</option>
              <option>Agua e Lulo (Cama)</option><option>Habitación 8 (Cama)</option>
            </select>
          </div>

          <div><label>Check-In</label><input id="res-checkin" type="date"></div>
          <div><label>Plataforma de Reserva</label>
            <select id="res-plataforma">
              <option>Directo / WhatsApp</option><option>Airbnb</option><option>Booking</option><option>Hostelworld</option>
            </select>
          </div>

          <div><label>Ciudad de Origen</label><input id="res-origen" placeholder="¿De dónde viene?"></div>
          <div><label>Próxima Ciudad</label><input id="res-proxima" placeholder="¿A dónde se dirige?"></div>
          
          <div><label>Medio de Pago</label>
            <select id="res-metodo" onchange="toggleDatafono(this.value)">
              <option value="Efectivo">Efectivo</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Datafono(Suma el 8%)">Datáfono</option>
            </select>
          </div>

          <div id="campo-aprobacion" class="hidden"><label>Código de Aprobación</label><input id="res-aprobacion" placeholder="6 dígitos"></div>
          <div><label>Valor Total Pagado</label><input id="res-valor" type="number" placeholder="$0"></div>
          
          <div class="md:col-span-3 pt-4 border-t">
            <button onclick="guardarReserva()" class="w-full bg-black text-white p-4 rounded-xl font-black uppercase tracking-wider hover:bg-gray-800 transition">Confirmar y Guardar Registro</button>
          </div>
        </div>
      </div>

      <div class="overflow-x-auto bg-white rounded-2xl shadow-md">
        <table class="w-full text-sm text-left">
          <thead class="bg-black text-white">
            <tr>
              <th class="p-4">Huésped</th>
              <th class="p-4">Habitación</th>
              <th class="p-4 text-center">Pago / Cód.</th>
              <th class="p-4">Email / WhatsApp</th>
              <th class="p-4 text-right">Total</th>
            </tr>
          </thead>
          <tbody id="tablaReservas"></tbody>
        </table>
      </div>
    </section>

    <section id="inventario" class="module hidden"><h1 class="text-3xl font-black mb-8 italic">INVENTARIO</h1></section>
    <section id="staff" class="module hidden"><h1 class="text-3xl font-black mb-8 italic">STAFF</h1></section>

  </main>
</div>

<script>
let db = {
  caja: JSON.parse(localStorage.getItem('lc_caja')) || [],
  reservas: JSON.parse(localStorage.getItem('lc_reservas')) || []
};

function showModule(id) {
  document.querySelectorAll('.module').forEach(m => m.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// CAJA MENOR
function registrarCaja() {
  const monto = parseFloat(document.getElementById('caja-monto').value);
  const tipo = document.getElementById('caja-tipo').value;
  const desc = document.getElementById('caja-desc').value;
  if(!monto || !desc) return alert("Faltan datos en Caja Menor.");
  db.caja.push({ id: Date.now(), hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), desc, tipo, monto });
  localStorage.setItem('lc_caja', JSON.stringify(db.caja));
  renderCaja();
}

function renderCaja() {
  const t = document.getElementById('tablaCaja');
  let saldo = 0; t.innerHTML = '';
  db.caja.slice().reverse().forEach(i => {
    if(i.tipo === 'ingreso' || i.tipo === 'apertura') saldo += i.monto;
    else saldo -= i.monto;
    t.innerHTML += `<tr class="border-b"><td class="p-4 font-bold text-gray-500">${i.hora}</td><td>${i.desc}</td><td class="text-center uppercase text-[9px] font-black ${i.tipo==='gasto'?'text-red-500':'text-green-600'}">${i.tipo}</td><td class="p-4 text-right font-bold">$${i.monto.toLocaleString()}</td></tr>`;
  });
  document.getElementById('saldo-total').innerText = `$${saldo.toLocaleString()}`;
  if(db.caja.length > 0) document.getElementById('estado-turno').innerText = "Turno Activo";
}

function generarCuadre() {
  const sistema = parseFloat(document.getElementById('saldo-total').innerText.replace(/[^0-9.-]+/g,""));
  const real = parseFloat(prompt("Ingrese dinero físico contado en caja:"));
  if(isNaN(real)) return;
  alert(`REPORTE DE CUADRE:\nSistema: $${sistema.toLocaleString()}\nFísico: $${real.toLocaleString()}\n\nDiferencia: $${(real - sistema).toLocaleString()}`);
}

// RESERVAS
function toggleDatafono(val) {
  const aprobDiv = document.getElementById('campo-aprobacion');
  // Solo se oculta/muestra el Código de Aprobación
  val === 'Datafono(Suma el 8%)' ? aprobDiv.classList.remove('hidden') : aprobDiv.classList.add('hidden');
}

function guardarReserva() {
  const res = {
    cliente: document.getElementById('res-cliente').value,
    habitacion: document.getElementById('res-habitacion').value,
    email: document.getElementById('res-email').value,
    whatsapp: document.getElementById('res-whatsapp').value,
    origen: document.getElementById('res-origen').value,
    proxima: document.getElementById('res-proxima').value,
    metodo: document.getElementById('res-metodo').value,
    cod: document.getElementById('res-aprobacion').value || 'N/A',
    valor: document.getElementById('res-valor').value
  };

  if(!res.cliente || !res.valor || !res.habitacion || !res.email) {
    return alert("Huésped, Habitación, Email y Valor son obligatorios.");
  }

  db.reservas.push(res);
  localStorage.setItem('lc_reservas', JSON.stringify(db.reservas));
  renderReservas();
  
  // Limpiar campos
  document.querySelectorAll('#reservas input, #reservas select').forEach(input => input.value = '');
  toggleDatafono('Efectivo');
}

function renderReservas() {
  const t = document.getElementById('tablaReservas'); t.innerHTML = '';
  db.reservas.forEach(r => {
    t.innerHTML += `
      <tr class="border-b hover:bg-gray-50">
        <td class="p-4"><b>${r.cliente}</b></td>
        <td class="p-4 text-xs">${r.habitacion}</td>
        <td class="p-4 text-center"><b>${r.metodo}</b><br><span class="text-[9px] text-gray-400">Cód: ${r.cod}</span></td>
        <td class="p-4 text-xs italic text-gray-500">${r.email}<br>${r.whatsapp}</td>
        <td class="p-4 text-right font-bold text-green-600">$${Number(r.valor).toLocaleString()}</td>
      </tr>
    `;
  });
}

window.onload = () => { renderCaja(); renderReservas(); };
</script>
</body>
</html>
